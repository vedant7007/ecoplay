name: Pull Request Verification

on:
  push:
    branches:
      - main
      - master
      - dev
      - develop
  pull_request:
    branches:
      - main
      - master
      - dev
      - develop

jobs:
  verify:
    name: Verify Codebase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run TypeScript Type Check
        run: npm run typecheck

      - name: Run ESLint
        run: npm run lint

      - name: Run Tests
        run: npm run test

      - name: Run Build
        run: npm run build
